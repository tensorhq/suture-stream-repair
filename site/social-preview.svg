<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="1280" height="640" fill="#0d1117"/>
  <rect x="0" y="0" width="1280" height="6" fill="#f78166"/>
  <text x="80" y="170" fill="#e6edf3" font-size="92" font-weight="700" letter-spacing="-2">Suture</text>
  <text x="80" y="240" fill="#9da7b3" font-size="34" font-weight="500">Repair truncated JSON in LLM streams, on the wire.</text>

  <!-- before/after code panel -->
  <rect x="80" y="290" width="1120" height="150" rx="12" fill="#161b22" stroke="#30363d"/>
  <text x="110" y="345" fill="#9da7b3" font-size="26" font-family="ui-monospace, Menlo, Consolas, monospace">{"city": "Par</text>
  <polygon points="448,330 462,323 462,337" fill="#f78166"/>
  <text x="478" y="345" fill="#f78166" font-size="22" font-family="ui-monospace, monospace">truncated · JSONDecodeError</text>
  <text x="110" y="405" fill="#7ee787" font-size="26" font-family="ui-monospace, Menlo, Consolas, monospace">{"city": "Par"}</text>
  <polygon points="448,390 462,383 462,397" fill="#7ee787"/>
  <text x="478" y="405" fill="#7ee787" font-size="22" font-family="ui-monospace, monospace">valid · safely closed</text>

  <!-- footer line -->
  <text x="80" y="520" fill="#c9d1d9" font-size="28" font-weight="600">OpenAI · Anthropic · Vertex AI · Bedrock</text>
  <text x="80" y="565" fill="#9da7b3" font-size="24">Ultra-low latency · holds no API keys · ~10µs/chunk · Rust</text>

  <text x="1200" y="600" fill="#6e7681" font-size="22" text-anchor="end">github.com/tensorhq/suture-stream-repair</text>
</svg>
